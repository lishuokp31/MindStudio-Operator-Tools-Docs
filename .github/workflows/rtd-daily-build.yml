name: Trigger Read the Docs Build

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    # 16:00 UTC = 00:00 Asia/BeiJing on the next day.
    - cron: "0 16 * * *"

jobs:
  trigger-rtd-build:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Read the Docs webhook
        env:
          RTD_WEBHOOK_URL: ${{ secrets.RTD_WEBHOOK_URL }}
          RTD_WEBHOOK_TOKEN: ${{ secrets.RTD_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$RTD_WEBHOOK_URL" ] || [ -z "$RTD_WEBHOOK_TOKEN" ]; then
            echo "RTD_WEBHOOK_URL or RTD_WEBHOOK_TOKEN is not configured."
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --form "branches=main" \
            --form "token=${RTD_WEBHOOK_TOKEN}" \
            "${RTD_WEBHOOK_URL}"
