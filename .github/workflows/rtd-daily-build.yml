name: Trigger Read the Docs Build

permissions:
  actions: write

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    # 16:00 UTC = 00:00 Asia/BeiJing on the next day.
    - cron: "0 17 * * *"

jobs:
  trigger-rtd-build:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Read the Docs webhook
        env:
          RTD_WEBHOOK_URL: ${{ secrets.RTD_WEBHOOK_URL }}
          RTD_WEBHOOK_TOKEN: ${{ secrets.RTD_WEBHOOK_TOKEN }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"branches":"main"}' \
            "${RTD_WEBHOOK_URL}"
