version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_checkout:
      - git submodule sync
      - git submodule update --init --depth 1
    pre_build:
      - python readthedocs/scripts/build_docs.py

submodules:
  include: all
  recursive: false

python:
  install:
    - requirements: readthedocs/requirements.txt

mkdocs:
  configuration: readthedocs/mkdocs.yml

formats: []
