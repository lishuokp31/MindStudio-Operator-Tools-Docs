site_name: MindStudio Profiler Tools
site_description: Ascend performance tooling portal built from MSTT submodules.
site_url: https://mstt.readthedocs.io/zh-cn/latest/
repo_url: https://gitcode.com/Ascend/mstt
repo_name: Ascend/mstt
edit_uri: ""
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  logo: assets/logos/mindstudio.jpg
  favicon: assets/logos/mindstudio.jpg
  features:
    - content.action.edit
    - content.code.copy
    - content.tabs.link
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.highlight
    - search.share
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-2
        name: 跟随系统
  font:
    text: Noto Sans SC
    code: JetBrains Mono

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - awesome-nav
  - search
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/git-alt
      link: https://gitcode.com/Ascend/mstt
