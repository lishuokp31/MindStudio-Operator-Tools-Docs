<div class="feature-tree-wrapper">
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* 所有样式限定在 .feature-tree-wrapper 内，不影响页面其他区域 */
    .feature-tree-wrapper {
        --ft-bg:#f0f2f5; --ft-card:#fff; --ft-title:#111827; --ft-text1:#1f2937; --ft-text2:#374151; --ft-text3:#4b5563;
        --ft-border:#e5e7eb; --ft-line:#d1d5db; --ft-hover:#f9fafb;
        --ft-color1:#2563eb; --ft-color2:#059669; --ft-color3:#7c3aed; --ft-color4:#d946ef;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    .feature-tree-wrapper * {
        box-sizing:border-box;
        transition: color 0.3s, background 0.3s, border-color 0.3s;
    }
    .feature-tree-wrapper[data-theme="dark"] {
        --ft-bg:#121212; --ft-card:#1e1e1e; --ft-title:#f9fafb; --ft-text1:#f3f4f6; --ft-text2:#e5e7eb; --ft-text3:#d1d5db;
        --ft-border:#333; --ft-line:#444; --ft-hover:#2d2d2d;
    }
    .feature-tree-container {
        width:100%;
        margin:0 auto; background:var(--ft-card);
        border-radius:18px; padding:32px; box-shadow:0 8px 28px rgba(0,0,0,0.08);
        border:1px solid var(--ft-border);
    }
    .tool-bar {
        display:flex; align-items:center; justify-content:space-between;
        margin-bottom:24px; flex-wrap:wrap; gap:12px;
    }
    .tree-title { font-size:26px; font-weight:bold; color:var(--ft-title); }
    .action-group { display:flex; gap:10px; }
    .btn {
        padding:8px 14px; border-radius:8px; border:none; cursor:pointer;
        font-size:14px; font-weight:500; display:flex; align-items:center; gap:6px;
        background:var(--ft-hover); color:var(--ft-text2);
    }
    .btn:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-primary { background:#2563eb; color:white; }

    /* 版本标签 */
    .version-label {
        display:inline-block; margin:3px 4px 3px 0;
        font-size:12px;
        padding:3px 6px;
        border-radius:6px;
        font-weight:bold; white-space:nowrap;
    }
    .v-support { background:#ecfdf5; color:#067f4d; border:1px solid #a7f3d0; }
    .v-part { background:#fffbeb; color:#d97706; border:1px solid #fcd34d; }
    .feature-tree-wrapper[data-theme="dark"] .v-support { background:#064e3b; color:#a7f3d0; }
    .feature-tree-wrapper[data-theme="dark"] .v-part { background:#78350f; color:#fcd34d; }

    /* 缩进缩小到 2/3：24px → 16px */
    .tree-node { list-style:none; padding-left:16px; position:relative; }
    .tree-root { padding-left:0; }

    .tree-item {
        display:flex; align-items:center; padding:4px 0;
        cursor:pointer; transition:all 0.25s ease; color:var(--ft-text2);
        position:relative;
    }
    .tree-item:hover { background:var(--ft-hover); border-radius:8px; padding-left:6px; }

    .toggle-btn {
        width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center;
        margin-right:6px;
        font-size:10px; color:var(--ft-text3); user-select:none; flex-shrink:0;
    }
    .toggle-btn.collapsed::after { content:"▶" }
    .toggle-btn.expanded::after { content:"▼" }
    .no-toggle { visibility:hidden; }

    .tree-node::before {
        content:""; position:absolute; top:0; left:8px;
        width:1px; height:100%; background:var(--ft-line);
        z-index:0;
    }

    .tree-item::before {
        display:none;
    }

    .tree-root>.tree-node::before { display:none; }

    .feature-name {
        flex:1; display:flex; align-items:center; gap:8px;
        min-width:0;
        word-wrap:break-word;
    }
    .feature-versions {
        display:flex; gap:4px; flex-wrap:wrap; flex-shrink:1;
        margin-left:8px;
        max-width:60%;
    }
    .icon { width:16px; text-align:center; flex-shrink:0; }

    .tree-root>.tree-node>.tree-item .feature-name { font-size:20px; font-weight:bold; color:var(--ft-text1); }
    .tree-root>.tree-node>.tree-child>.tree-node>.tree-item .feature-name { font-size:18px; font-weight:500; color:var(--ft-color1); }
    .tree-root>.tree-node:nth-child(2)>.tree-child>.tree-node>.tree-item .feature-name { color:var(--ft-color2); }
    .tree-root>.tree-node:nth-child(3)>.tree-child>.tree-node>.tree-item .feature-name { color:var(--ft-color3); }
    .tree-child .tree-child .tree-item .feature-name { font-size:17px; color:var(--ft-text2); }
    .tree-child .tree-child .tree-child .tree-item .feature-name { font-size:16px; color:var(--ft-text3); }

    /* 样例跳转按钮 —— 高亮醒目，与版本标签彻底区分 */
    .ft-example-btn {
        display:inline-flex; align-items:center; gap:4px;
        padding:4px 14px; margin-left:12px;
        font-size:12px; font-weight:700;
        color:#fff; background:linear-gradient(135deg, #7c3aed, #a855f7);
        border:none; border-radius:14px;
        text-decoration:none; white-space:nowrap;
        flex-shrink:0;
        box-shadow:0 2px 6px rgba(124,58,237,.4);
        transition:transform .15s, box-shadow .15s;
    }
    .ft-example-btn:hover {
        transform:translateY(-2px);
        box-shadow:0 4px 14px rgba(124,58,237,.55);
        color:#fff;
    }
    .feature-tree-wrapper[data-theme="dark"] .ft-example-btn {
        box-shadow:0 2px 6px rgba(168,85,247,.35);
    }
    .feature-tree-wrapper[data-theme="dark"] .ft-example-btn:hover {
        box-shadow:0 4px 14px rgba(168,85,247,.5);
    }
</style>

<div class="feature-tree-container">
    <div class="tool-bar">
        <h2 class="tree-title">MindStudio Operator Tools - 全功能特性树</h2>
        <div class="action-group">
            <button class="btn" id="expandAll"><i class="fa-solid fa-plus"></i> 全部展开</button>
            <button class="btn" id="collapseAll"><i class="fa-solid fa-minus"></i> 全部收起</button>
            <button class="btn btn-primary" id="toggleDark"><i class="fa-solid fa-moon"></i> 暗黑模式</button>
        </div>
    </div>

    <ul class="tree-root">
        <!-- FEATURE_TREE_INJECT_HERE -->
    </ul>
</div>

<script>
(function() {
    var FT_STORAGE_KEY = 'ft-expanded';

    function getExpandedSet() {
        try {
            var raw = sessionStorage.getItem(FT_STORAGE_KEY);
            return raw ? new Set(JSON.parse(raw)) : new Set();
        } catch (_) { return new Set(); }
    }

    function saveExpandedSet(s) {
        sessionStorage.setItem(FT_STORAGE_KEY, JSON.stringify(Array.from(s)));
    }

    function applyNode(btn, hide) {
        var child = btn.closest('.tree-item');
        if (!child) return;
        child = child.nextElementSibling;
        if (!child) return;
        child.style.display = hide ? 'none' : 'block';
        btn.classList.toggle('collapsed', hide);
        btn.classList.toggle('expanded', !hide);
    }

    function getPath(btn) {
        var node = btn.closest('.tree-node');
        return node ? node.dataset.ftPath : '';
    }

    function isLevel1(path) {
        return path.indexOf('-') === -1;
    }

    // ---- 恢复树状态（每次导航回来都会调用） ----
    function restoreTreeState() {
        var expanded = getExpandedSet();
        var btns = document.querySelectorAll('.feature-tree-wrapper .toggle-btn');
        if (!btns.length) return;

        if (expanded.size === 0) {
            btns.forEach(function(btn) {
                if (btn.classList.contains('no-toggle')) return;
                var path = getPath(btn);
                if (isLevel1(path)) expanded.add(path);
            });
            saveExpandedSet(expanded);
        }

        btns.forEach(function(btn) {
            if (btn.classList.contains('no-toggle')) return;
            applyNode(btn, !expanded.has(getPath(btn)));
        });
    }

    function handleToggle(btn) {
        var child = btn.closest('.tree-item');
        if (!child) return;
        child = child.nextElementSibling;
        if (!child) return;
        var hide = child.style.display !== 'none';
        applyNode(btn, hide);
        var expanded = getExpandedSet();
        var path = getPath(btn);
        if (hide) expanded.delete(path); else expanded.add(path);
        saveExpandedSet(expanded);
    }

    function expandAll() {
        var expanded = new Set();
        document.querySelectorAll('.feature-tree-wrapper .toggle-btn').forEach(function(btn) {
            if (btn.classList.contains('no-toggle')) return;
            applyNode(btn, false);
            expanded.add(getPath(btn));
        });
        saveExpandedSet(expanded);
    }

    function collapseAll() {
        document.querySelectorAll('.feature-tree-wrapper .toggle-btn').forEach(function(btn) {
            if (btn.classList.contains('no-toggle')) return;
            applyNode(btn, true);
        });
        saveExpandedSet(new Set());
    }

    // ---- 事件委托：只绑定一次（window 标记防重复） ----
    if (!window.__ftListening) {
        window.__ftListening = true;
        document.addEventListener('click', function(e) {
            var row = e.target.closest('.feature-tree-wrapper .tree-item');
            if (row && !e.target.closest('a, button')) {
                var btn = row.querySelector('.toggle-btn');
                if (btn && !btn.classList.contains('no-toggle')) {
                    e.stopPropagation();
                    handleToggle(btn);
                    return;
                }
            }
            if (e.target.closest('#expandAll')) { expandAll(); return; }
            if (e.target.closest('#collapseAll')) { collapseAll(); return; }
            if (e.target.closest('#toggleDark')) {
                var wrapper = document.querySelector('.feature-tree-wrapper');
                if (!wrapper) return;
                var isDark = wrapper.dataset.theme === 'dark';
                if (isDark) {
                    delete wrapper.dataset.theme;
                    e.target.closest('#toggleDark').innerHTML = '<i class="fa-solid fa-moon"></i> 暗黑模式';
                } else {
                    wrapper.dataset.theme = 'dark';
                    e.target.closest('#toggleDark').innerHTML = '<i class="fa-solid fa-sun"></i> 明亮模式';
                }
            }
        });
    }

    // ---- MkDocs Material instant navigation：订阅一次 ----
    if (!window.__ftSubscribed && typeof document$ !== 'undefined') {
        window.__ftSubscribed = true;
        document$.subscribe(function() {
            // 延迟一帧确保 DOM 已就绪
            requestAnimationFrame(function() {
                restoreTreeState();
            });
        });
    }

    // ---- 每次脚本执行都恢复状态（首次加载 & instant 返回均触发） ----
    restoreTreeState();
})();
</script>
</div>
