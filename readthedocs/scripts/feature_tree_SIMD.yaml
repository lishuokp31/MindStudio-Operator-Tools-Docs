        - AscendC SIMD A5
        - Triton A3
        - Triton A5
        - CATLASS A3
        - CATLASS A5
      - name: 硬件异常上报(Device)
      - name: 非法malloc/free使用检查（Device）
      - name: Device malloc泄漏检查（Device）
      - name: Api调用错误检查(Host)
        version:
        - AscendC SIMD A3:part(50%)
        - AscendC SIMD A5:part(50%)
