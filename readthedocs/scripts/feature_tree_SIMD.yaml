        - Triton A3:part(20%)
        - Triton A5
        - CATLASS A3:part(20%)
        - CATLASS A5
      - name: 图模式支持
        version:
        - AscendC SIMD A3:part(50%)
        - AscendC SIMD A5:part(50%)
        - Triton A3:part(50%)
        - Triton A5:part(50%)
        - CATLASS A3:part(50%)
        - CATLASS A5:part(50%)
      - name: 支持进程attach方式检测
    - name: 开放接口
      icon: list-check
      children:
      - name: Memory API，支持用户替换CUDA API配合工具使用（Host）
        version:
        - AscendC SIMD A3
        - AscendC SIMD A5
        - Triton A3
        - Triton A5
