        version:
        - AscendC SIMD A3
        - AscendC SIMD A5
        - Triton A3
        - Triton A5
        - CATLASS A3
        - CATLASS A5
      - name: 异常时可以生成core文件，用于调试器分析
      - name: 识别到异常时动作（终止执行，继续执行）
      - name: 误报抑制文件控制误报情况
